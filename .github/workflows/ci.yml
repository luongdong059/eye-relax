name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test & đóng gói app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Chạy unit tests
        run: swift test

      - name: Đóng gói EyeRelax.app
        run: ./scripts/build-app.sh

      - name: Nén app làm artifact
        run: ditto -c -k --keepParent build/EyeRelax.app build/EyeRelax.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EyeRelax-${{ github.sha }}
          path: build/EyeRelax.zip
          retention-days: 14
